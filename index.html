<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PortfolioAlexCorvete</title>
</head>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap');
    *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Poppins', sans-serif;
    }    
    a{
        color: white;
        text-decoration: none;
    }
    .navbar{
        position: fixed;
        left: 0;
        top: 0;
        width: 100%;
        padding: 25px 9%;        
        display: flex;
        justify-content: space-between;
        align-items: center;
        z-index: 100;
        visibility: hidden;
        opacity: 0;
        animation: show-content 1.5s linear forwards;
        animation-delay: 1.2s;
    }
    @keyframes show-content {
        100% {
            visibility: visible;
            opacity: 1;
        }
    }
    .navbar .logo{
        font-size: 30px;
        font-weight: 700;
        color: #ff073a;
    }
    .navbar ul{
        display: flex;        
    }
    .navbar ul li{
        list-style: none;
        margin-left: 35px;
    }
    .navbar ul li a {
        font-size: 20px;
        font-weight: 500;
        transition: .5s;
    }
    .navbar ul li:hover a,
    .navbar ul li.active a{
        color: #ff073a;
    }
    .home{
        display: flex;
        align-items: center;
        gap: 50px;
        height: 100vh;
        padding: 60px 9% 0;
        color: white;
         visibility: hidden;
        opacity: 0;
        animation: show-content 1.5s linear forwards;
        animation-delay: 1s;
    }
    .home-info h1{
        font-size: 55px;
        color: #ff073a;
    }
    .home-info h2{
        font-size: 32px;
        margin-top: -10px;
    }
    .home-img .img-box{
        position: relative;
        width: 32vw;
        height: 32vw;
        border-radius: 50%;
        padding: 5px;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
    }
    .home-img .img-box::before,
    .home-img .img-box::after {
        content: '';
        position: absolute;
        width: 500px;
        height: 500px;
        background: conic-gradient(transparent, transparent, transparent, #ff073a);
        transform: rotate(0deg);
        animation: rotate-border 10s linear infinite;
    }
    .home-img .img-box::after{
        animation-delay: -5s;
    }
    @keyframes rotate-border{
        100% {
            transform: rotate(360deg);
        }
    }
    .home-img .img-box .img-item {
        position: relative;
        width: 100%;
        height: 100%;
        background: #000000;
        border-radius: 50%;
        border: 1px solid #000000;
        display: flex;
        justify-content: center;
        z-index: 1;
        overflow: hidden;
    }
    .home-img .img-box .img-item img {
        position: absolute;
        top: 15px;
        display: block;
        width: 180%;
        object-fit: cover;
        mix-blend-mode: lighten;
    }
    .bars-animation{
        position: absolute;
        width: 100%;
        height: 100%;
        display: flex;
        z-index: -1;
    }
    .bars-animation .bar{
        width: 100%;
        height: 100%;
        background: #000000;        
        transform: translateY(-100%);
        animation: show-bars .5s ease-in-out forwards;
        animation-delay: calc(.1s * var(--i));
    }
    @keyframes show-bars {
        100% {
            transform: translateY(0%);
        }
    }
    /* Responsividade para Tablets e Celulares */
@media (max-width: 768px) {
    .navbar {
        padding: 15px 5%;
        flex-direction: column; /* Empilha logo e menu */
        gap: 10px;
    }

    .navbar ul {
        flex-wrap: wrap; /* Permite que os links quebrem linha se necessário */
        justify-content: center;
    }

    .navbar ul li {
        margin: 5px 10px; /* Reduz o espaçamento lateral */
    }

    .navbar ul li a {
        font-size: 16px; /* Diminui a fonte do menu */
    }

    .home {
        flex-direction: column-reverse; /* Imagem em cima, texto embaixo */
        justify-content: center;
        text-align: center;
        padding: 100px 5% 20px;
        height: auto; /* Permite que a página cresça verticalmente */
    }

    .home-info h1 {
        font-size: 35px; /* Diminui o nome */
    }

    .home-info h2 {
        font-size: 22px;
    }

    .home-img .img-box {
        width: 250px; /* Tamanho fixo para não sumir no mobile */
        height: 250px;
        margin-bottom: 20px;
    }
}

/* Ajuste fino para celulares muito pequenos */
@media (max-width: 450px) {
    .navbar .logo {
        font-size: 24px;
    }
    
    .navbar ul li a {
        font-size: 14px;
    }
}


</style>
<body>
    <nav class="navbar">
        <a href="#" class="logo ">Portfólio</a>
        <ul>
            <li class="active"><a href="#">Home</a></li>
            <li><a href="#">About</a></li>
            <li><a href="https://alex-olivrodeenoque-7b5127.netlify.app/" target="_blank">O Livro de Enoque</a></li>
            <li><a href="https://epic-fury-876b2c.netlify.app/" target="_blank">Epic Fury</a></li>
            <li><a href="https://alexcorvete.github.io/The-Marked-Knight/" target="_blank">The Marked Knight</a></li>
        </ul>
    </nav>
    <div class="bars-animation">
        <div class="bar" style="--i:6;"></div>
        <div class="bar" style="--i:5;"></div>
        <div class="bar" style="--i:4;"></div>
        <div class="bar" style="--i:3;"></div>
        <div class="bar" style="--i:2;"></div>
        <div class="bar" style="--i:1;"></div>
    </div>

    <section class="home">
        <div class="home-info">
            <h1>Alex Corvete</h1>
            <h2>Eu sou um desenvolvedor aprendiz</h2>
        </div>
        <div class="home-img">
            <div class="img-box">
                <div class="img-item">
                    <img src="recursos/portfolioSemFundo.png" alt="Alex Pontes">
                </div>
            </div>
        </div>
    </section>
</body>
</html>
